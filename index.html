<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delhi Metro Route Finder</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


    <div class="header">


        <h1>
            🚇 Delhi Metro Route Finder
        </h1>


        <p>
            Find the fastest metro route easily
        </p>


    </div>





    <div class="metro-card">


        <div class="input-box">


            <label>
                🚉 Source Station
            </label>


            <select>

                <option>
                    Select Source Station
                </option>

                <option>
                    Rajiv Chowk
                </option>

                <option>
                    Noida City Centre
                </option>

                <option>
                    Dwarka
                </option>


            </select>


        </div>





        <div class="input-box">


            <label>
                📍 Destination Station
            </label>


            <select>


                <option>
                    Select Destination Station
                </option>


                <option>
                    Central Secretariat
                </option>


                <option>
                    Lajpat Nagar
                </option>


                <option>
                    Kashmere Gate
                </option>


            </select>


        </div>



    </div>





    <button>

        🔍 Find Route

    </button>




</div>



</body>

</html>
