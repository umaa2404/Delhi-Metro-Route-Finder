<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Delhi Metro Route Finder</title>

    <link rel="stylesheet" href="style.css" />
</head>


<body>

    <div class="container">

        <div class="header">

            <h1>🚇 Delhi Metro Route Finder</h1>

            <p>Find the fastest metro route easily</p>

        </div>



        <div class="metro-card">


            <div class="input-box">

                <label>🚉 Source Station</label>

                <select id="source">

                    <option value="">
                        Select Source Station
                    </option>

                </select>

            </div>




            <div class="input-box">

                <label>📍 Destination Station</label>

                <select id="destination">

                    <option value="">
                        Select Destination Station
                    </option>

                </select>

            </div>


        </div>



        <button id="findRoute" onclick="findroute()">
            🔍 Find Route
        </button>



        <!-- JavaScript will display result here -->
        <div id="output"></div>



    </div>



    <script src="index.js"></script>


</body>

</html>
